name: Bug report
description: Report a reproducible problem in agent-fleet.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include tokens, private repository names, private hostnames, server IPs, or logs with secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List exact steps or commands.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, npm version, and relevant agent CLI versions.
      placeholder: |
        OS:
        Node:
        npm:
        Codex:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      render: shell
